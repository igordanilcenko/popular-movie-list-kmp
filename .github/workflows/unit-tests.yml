name: Unit Tests

on:
  pull_request:
    branches: [ main ]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run shared module unit tests
        run: ./gradlew :shared:feature:movies:testAndroidHostTest

      - name: Run Android ViewModel unit tests
        run: ./gradlew :androidApp:feature:movies:testDebugUnitTest
